<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap App Icon</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1c1c1a; color: #f0ede8; margin: 0; padding: 30px; text-align: center; }
  h1 { color: #C8961E; font-size: 22px; }
  p { color: #a0a09a; font-size: 14px; max-width: 460px; margin: 8px auto 20px; line-height: 1.5; }
  .preview { width: 260px; height: 260px; border-radius: 56px; margin: 10px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: block; }
  canvas { display: none; }
  .styles { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
  .style-btn { background: #2e2e2b; border: 1px solid #444; color: #f0ede8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .style-btn.active { background: #C8961E; border-color: #C8961E; color: #fff; font-weight: 600; }
  .download { background: #C8961E; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .download:hover { background: #9A6E12; }
</style>
</head>
<body>
  <h1>SportsSwap App Icon</h1>
  <p>The swap-arrows mark. Pick gold or white, then download — it saves a 1024×1024 PNG ready for the App Store.</p>

  <img id="preview" class="preview" alt="icon preview">
  <canvas id="canvas" width="1024" height="1024"></canvas>

  <div class="styles">
    <button class="style-btn active" data-style="gold">Gold background</button>
    <button class="style-btn" data-style="white">White background</button>
  </div>

  <div><button class="download" onclick="downloadIcon()">⬇ Download icon (1024×1024)</button></div>

<script>
const GOLD = '#C8961E';
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
let style = 'gold';

function drawSwapArrows(color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 78;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // Top arrow → points right
  ctx.beginPath();
  ctx.moveTo(330, 430);
  ctx.lineTo(694, 430);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(600, 336);
  ctx.lineTo(694, 430);
  ctx.lineTo(600, 524);
  ctx.stroke();
  // Bottom arrow ← points left
  ctx.beginPath();
  ctx.moveTo(694, 594);
  ctx.lineTo(330, 594);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(424, 500);
  ctx.lineTo(330, 594);
  ctx.lineTo(424, 688);
  ctx.stroke();
}

function draw() {
  const S = 1024;
  if (style === 'gold') {
    ctx.fillStyle = GOLD;
    ctx.fillRect(0, 0, S, S);
    drawSwapArrows('#ffffff');
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, S, S);
    drawSwapArrows(GOLD);
  }
  document.getElementById('preview').src = cv.toDataURL('image/png');
}

document.querySelectorAll('.style-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.style-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.style;
    draw();
  };
});

function downloadIcon() {
  const a = document.createElement('a');
  a.download = 'SportsSwap-icon-1024.png';
  a.href = cv.toDataURL('image/png');
  a.click();
}

draw();
</script>
</body>
</html>
